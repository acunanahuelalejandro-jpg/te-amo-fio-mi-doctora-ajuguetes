<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Cumpleaños Fiore ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
background:linear-gradient(180deg,#ffd6e7,#ffc2dc,#ffe4ef);
color:white;
}

/* CAPA OSCURA */

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.18);
z-index:-1;
}

/* FONDO */

.fondo{
position:fixed;
inset:0;
overflow:hidden;
z-index:-2;
}

/* GLOBOS */

.globo{
position:absolute;
bottom:-200px;
width:clamp(50px,8vw,90px);
animation:subir linear infinite;
opacity:0.8;
}

.globo:nth-child(1){
left:10%;
animation-duration:10s;
}

.globo:nth-child(2){
left:30%;
animation-duration:13s;
}

.globo:nth-child(3){
left:50%;
animation-duration:11s;
}

.globo:nth-child(4){
left:70%;
animation-duration:15s;
}

.globo:nth-child(5){
left:85%;
animation-duration:12s;
}

@keyframes subir{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-130vh);
}
}

/* CONTENIDO */

.contenido{
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
padding-bottom:50px;
text-align:center;
}

/* TITULOS */

h1{
font-size:clamp(34px,6vw,60px);
margin-top:20px;
color:white;
text-shadow:
0 0 8px rgba(0,0,0,0.8),
0 0 15px rgba(0,0,0,0.8);
padding-inline:10px;
}

.sub{
font-size:clamp(18px,3vw,26px);
margin-top:10px;
font-weight:bold;
text-shadow:
0 0 8px rgba(0,0,0,0.8),
0 0 15px rgba(0,0,0,0.8);
padding-inline:10px;
}

/* TORTA */

.torta{
font-size:clamp(80px,14vw,140px);
margin-top:20px;
animation:latido 2s infinite;
filter:drop-shadow(0 0 10px rgba(0,0,0,0.5));
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* CARTA */

.carta{
width:min(92%,850px);
background:rgba(255,255,255,0.22);
padding:clamp(20px,4vw,40px);
border-radius:30px;
margin-top:30px;
font-size:clamp(16px,2vw,22px);
line-height:1.9;
font-weight:bold;
color:white;
box-shadow:0 0 25px rgba(255,255,255,0.4);
backdrop-filter:blur(12px);
text-shadow:
0 0 6px rgba(0,0,0,0.85),
0 0 12px rgba(0,0,0,0.7);
border:2px solid rgba(255,255,255,0.3);
word-wrap:break-word;
}

/* GALERIA */

.galeria{
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
overflow-x:auto;
padding:25px 15px;
margin-top:20px;
scroll-snap-type:x mandatory;
}

.galeria img{
width:min(85vw,320px);
height:auto;
border-radius:25px;
box-shadow:0 0 20px rgba(255,255,255,0.7);
transition:0.4s;
flex-shrink:0;
scroll-snap-align:center;
}

.galeria img:hover{
transform:scale(1.03);
}

/* MENSAJES */

.bloqueado{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.bloqueado h2{
font-size:clamp(32px,6vw,52px);
margin-bottom:20px;
text-shadow:
0 0 8px rgba(0,0,0,0.8),
0 0 15px rgba(0,0,0,0.8);
}

.bloqueado p{
font-size:clamp(18px,3vw,26px);
font-weight:bold;
text-shadow:
0 0 8px rgba(0,0,0,0.8),
0 0 15px rgba(0,0,0,0.8);
}

/* PANTALLA MUSICA */

#playButton{
position:fixed;
inset:0;
background:rgba(255,192,220,0.96);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:clamp(24px,5vw,42px);
color:white;
font-weight:bold;
cursor:pointer;
text-align:center;
padding:20px;
text-shadow:
0 0 8px rgba(0,0,0,0.8),
0 0 15px rgba(0,0,0,0.8);
}

/* SCROLL */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#ff89b5;
border-radius:20px;
}

</style>
</head>

<body>

<div id="app"></div>

</body>
</html>
