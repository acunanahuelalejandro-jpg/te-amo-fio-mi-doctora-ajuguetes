<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>te amo fiorella</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    overflow-x:hidden;
}

/* FONDO DE ESTRELLAS */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation:moveStars 80s linear infinite;
    z-index:-1;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:0 2000px;}
}

/* ADN */

#dna{
    position:relative;
    height:4000px;
    margin-top:100px;
}

.item{
    position:absolute;
    left:50%;
    font-family:monospace;
    color:#ff4d6d;
    font-size:20px;
    transition:transform 0.2s;
}

</style>
</head>

<body>

<div class="stars"></div>

<h1>
te amo loca no te estreces no llores estoy seguro que vas a poder con todo porque sos la mejor ❤️
</h1>

<p>
sos capaz de lograrlo yo confio en vos, no bajes los brazos. siempre que pienses que no podes pensa que hay un coloradito que confia más en vos que en el mismo.
</p>

<!-- MUSICA -->
<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="dna"></div>

<script>

const container = document.getElementById("dna");
let items=[];

for(let i=0;i<180;i++){

    let left=document.createElement("div");
    left.className="item";
    left.innerText="te amo";

    let right=document.createElement("div");
    right.className="item";
    right.innerText="te amo";

    container.appendChild(left);
    container.appendChild(right);

    items.push({left,right,i});
}

function updateDNA(){

    let scroll=window.scrollY*0.02;

    items.forEach(e=>{

        /* se abre y se cierra mucho */
        let wave=Math.sin(e.i*0.25 + scroll)*200;

        /* crea formas */
        let twist=Math.cos(e.i*0.15 + scroll)*40;

        let y=e.i*22;

        e.left.style.transform=
        `translateX(${wave}px) translateY(${y}px) rotate(${twist}deg)`;

        e.right.style.transform=
        `translateX(${-wave}px) translateY(${y}px) rotate(${-twist}deg)`;

    });

}

window.addEventListener("scroll",updateDNA);
updateDNA();

</script>

</body>
</html>
