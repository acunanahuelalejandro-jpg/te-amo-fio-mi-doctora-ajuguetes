<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Cumpleaños Fiore ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(180deg,#ffd6e7,#ffc2dc,#ffe4ef);
height:100vh;
color:white;
}

/* FONDO */

.fondo{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

/* GLOBOS */

.globo{
position:absolute;
bottom:-200px;
width:80px;
animation:subir linear infinite;
opacity:0.8;
}

.globo:nth-child(1){
left:10%;
animation-duration:10s;
}

.globo:nth-child(2){
left:30%;
animation-duration:13s;
}

.globo:nth-child(3){
left:50%;
animation-duration:11s;
}

.globo:nth-child(4){
left:70%;
animation-duration:15s;
}

.globo:nth-child(5){
left:85%;
animation-duration:12s;
}

@keyframes subir{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-130vh);
}
}

/* CONTENIDO */

.contenido{
height:100vh;
overflow-y:auto;
padding:20px;
text-align:center;
backdrop-filter:blur(3px);
}

/* TITULO */

h1{
font-size:48px;
margin-top:20px;
color:#ff4f9a;
text-shadow:0 0 10px white;
}

/* SUB */

.sub{
font-size:22px;
margin-top:10px;
color:#fff;
}

/* TORTA */

.torta{
font-size:120px;
margin-top:20px;
animation:latido 2s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* CARTA */

.carta{
background:rgba(255,255,255,0.25);
padding:30px;
border-radius:30px;
max-width:850px;
margin:30px auto;
font-size:20px;
line-height:1.8;
color:white;
box-shadow:0 0 25px rgba(255,255,255,0.5);
backdrop-filter:blur(8px);
}

/* GALERIA */

.galeria{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px;
justify-content:center;
margin-top:20px;
}

.galeria img{
width:280px;
border-radius:25px;
box-shadow:0 0 20px rgba(255,255,255,0.7);
transition:0.4s;
}

.galeria img:hover{
transform:scale(1.05);
}

/* MENSAJES */

.bloqueado{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.bloqueado h2{
font-size:40px;
color:#ff4f9a;
margin-bottom:20px;
}

.bloqueado p{
font-size:22px;
}

/* PLAYER */

.player{
margin-top:30px;
margin-bottom:40px;
}

/* SCROLL */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#ff89b5;
border-radius:20px;
}

</style>
</head>

<body>

</body>
</html>
