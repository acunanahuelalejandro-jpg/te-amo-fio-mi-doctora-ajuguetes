<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>te amo fiorella</title>

<style>

body{
    margin:0;
        background:black;
            color:white;
                text-align:center;
                    font-family:Arial;
                        overflow-x:hidden;
                        }

                        /* FONDO DE ESTRELLAS */

                        .stars{
                            position:fixed;
                                width:100%;
                                    height:100%;
                                        background:url("https://www.transparenttextures.com/patterns/stardust.png");
                                            z-index:-1;
                                            }

                                            /* TITULO */

                                            h1{
                                                font-size:42px;
                                                    margin-top:40px;
                                                        cursor:pointer;
                                                        }

                                                        /* MENSAJE GRANDE */

                                                        p{
                                                            max-width:900px;
                                                                margin:auto;
                                                                    margin-top:30px;
                                                                        font-size:26px;
                                                                            line-height:1.6;
                                                                                padding:20px;
                                                                                }

                                                                                /* ADN */

                                                                                #dna{
                                                                                    position:relative;
                                                                                        height:4200px;
                                                                                            margin-top:120px;
                                                                                            }

                                                                                            .item{
                                                                                                position:absolute;
                                                                                                    left:50%;
                                                                                                        font-family:monospace;
                                                                                                            color:#ff4d6d;
                                                                                                                font-size:22px;
                                                                                                                }

                                                                                                                /* CELULARES */

                                                                                                                @media (max-width:600px){

                                                                                                                h1{
                                                                                                                font-size:48px;
                                                                                                                }

                                                                                                                p{
                                                                                                                font-size:30px;
                                                                                                                padding:25px;
                                                                                                                }

                                                                                                                .item{
                                                                                                                font-size:24px;
                                                                                                                }

                                                                                                                }

                                                                                                                </style>
                                                                                                                </head>

                                                                                                                <body>

                                                                                                                <div class="stars"></div>

                                                                                                                <h1 id="mensaje">
                                                                                                                mi amor ❤️
                                                                                                                </h1>

                                                                                                                <p>
                                                                                                                no puedo explicarte lo que siento cuando te veo llegar, arreglas mi espiritu con cada beso, elevas mi vibra con cada caricia, tenes la medida justa de todo lo que me gusta te apoderaste de mi mente, robaste mi inconciente porque lo unico que puedo es pensar en vos
                                                                                                                </p>

                                                                                                                <div id="dna"></div>

                                                                                                                <audio id="musica" loop>
                                                                                                                <source src="musica.mp3" type="audio/mpeg">
                                                                                                                </audio>

                                                                                                                <script>

                                                                                                                const container = document.getElementById("dna");
                                                                                                                let items=[];

                                                                                                                for(let i=0;i<180;i++){

                                                                                                                    let left=document.createElement("div");
                                                                                                                        left.className="item";
                                                                                                                            left.innerText="te amo";

                                                                                                                                let right=document.createElement("div");
                                                                                                                                    right.className="item";
                                                                                                                                        right.innerText="te amo";

                                                                                                                                            container.appendChild(left);
                                                                                                                                                container.appendChild(right);

                                                                                                                                                    items.push({left,right,i});
                                                                                                                                                    }

                                                                                                                                                    function updateDNA(){

                                                                                                                                                        let scroll=window.scrollY*0.03;

                                                                                                                                                            items.forEach(e=>{

                                                                                                                                                                    let wave=Math.sin(e.i*0.25 + scroll)*240;

                                                                                                                                                                            let y=e.i*24;

                                                                                                                                                                                    e.left.style.transform=
                                                                                                                                                                                            `translateX(${wave}px) translateY(${y}px)`;

                                                                                                                                                                                                    e.right.style.transform=
                                                                                                                                                                                                            `translateX(${-wave}px) translateY(${y}px)`;

                                                                                                                                                                                                                });

                                                                                                                                                                                                                }

                                                                                                                                                                                                                window.addEventListener("scroll",updateDNA);
                                                                                                                                                                                                                updateDNA();

                                                                                                                                                                                                                /* MUSICA */

                                                                                                                                                                                                                const mensaje = document.getElementById("mensaje");
                                                                                                                                                                                                                const musica = document.getElementById("musica");

                                                                                                                                                                                                                mensaje.addEventListener("click", function(){
                                                                                                                                                                                                                    musica.play();
                                                                                                                                                                                                                    });

                                                                                                                                                                                                                    </script>

                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                    </html>
