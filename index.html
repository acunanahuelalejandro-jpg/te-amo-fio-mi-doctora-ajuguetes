<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para vos ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
    text-align: center;
}

/* Pantalla inicial */
#pantallaInicio {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
}

/* Video centrado */
#videoContainer {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

video {
    width: 80%;
    max-width: 400px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255, 0, 100, 0.6);
}

/* Corazones (si ya tenías animación, esto lo mantiene simple) */
.corazon {
    position: absolute;
    color: red;
    animation: flotar 5s linear infinite;
}

@keyframes flotar {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body onclick="mostrarVideo()">

<div id="pantallaInicio">
    Tocá la pantalla ❤️
</div>

<!-- VIDEO (reemplaza el álbum) -->
<div id="videoContainer">
    <video id="miVideo" controls>
        <source src="video.mp4" type="video/mp4">
        Tu navegador no soporta video.
    </video>
</div>

<script>
function mostrarVideo() {
    document.getElementById("pantallaInicio").style.display = "none";
    document.getElementById("videoContainer").style.display = "block";

    let video = document.getElementById("miVideo");
    video.play();
}

/* Corazones flotando */
function crearCorazon() {
    const corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML = "❤️";

    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(corazon);

    setTimeout(() => {
        corazon.remove();
    }, 5000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
