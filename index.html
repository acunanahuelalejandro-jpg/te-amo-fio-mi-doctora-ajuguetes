<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>te amo fiorella</title>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow-x:hidden;
}

/* PANTALLA INICIAL */

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
z-index:10;
cursor:pointer;
}

/* ESTRELLAS */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
z-index:-2;
}

/* CORAZONES */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp 8s linear infinite;
color:#ff4d6d;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* TITULO */

h1{
font-size:50px;
margin-top:40px;
animation:fadeIn 3s;
}

/* MENSAJE */

p{
max-width:900px;
margin:auto;
margin-top:30px;
font-size:30px;
line-height:1.6;
padding:25px;
animation:fadeIn 4s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* ADN */

#dna{
position:relative;
height:4200px;
margin-top:120px;
}

.item{
position:absolute;
left:50%;
font-family:monospace;
color:#ff4d6d;
font-size:24px;
}

</style>
</head>

<body>

<div id="startScreen">toca la pantalla ❤️</div>

<div class="stars"></div>

<h1>mi amor ❤️</h1>

<p>
no puedo explicarte lo que siento cuando te veo llegar, arreglas mi espiritu con cada beso, elevas mi vibra con cada caricia, tenes la medida justa de todo lo que me gusta te apoderaste de mi mente, robaste mi inconciente porque lo unico que puedo es pensar en vos
</p>

<div id="dna"></div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSICA */

const startScreen=document.getElementById("startScreen");
const musica=document.getElementById("musica");

startScreen.addEventListener("click",()=>{
musica.play();
startScreen.style.display="none";
});

/* ADN */

const container=document.getElementById("dna");
let items=[];

for(let i=0;i<180;i++){

let left=document.createElement("div");
left.className="item";
left.innerText="te amo";

let right=document.createElement("div");
right.className="item";
right.innerText="te amo";

container.appendChild(left);
container.appendChild(right);

items.push({left,right,i});
}

function updateDNA(){

let scroll=window.scrollY*0.03;

items.forEach(e=>{

let wave=Math.sin(e.i*0.25 + scroll)*260;

let y=e.i*24;

e.left.style.transform=
`translateX(${wave}px) translateY(${y}px)`;

e.right.style.transform=
`translateX(${-wave}px) translateY(${y}px)`;

});

}

window.addEventListener("scroll",updateDNA);
updateDNA();

/* CORAZONES */

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,600);

</script>

</body>
</html>
