<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te amo ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Pantalla inicial */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  cursor: pointer;
}

/* Album */
#album {
  display: none;
  width: 100%;
  height: 100vh;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* Imagen centrada */
#album img {
  max-width: 80%;
  max-height: 80%;
  object-fit: contain;
  border-radius: 20px;
  box-shadow: 0 0 30px pink;
}

/* Botones */
.boton {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 10px 20px;
  cursor: pointer;
  border-radius: 10px;
}

#prev {
  left: 20px;
}

#next {
  right: 20px;
}

/* Corazones */
.corazon {
  position: fixed;
  color: pink;
  animation: flotar 5s linear infinite;
}

@keyframes flotar {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="inicio" onclick="mostrarAlbum()">
  <h1>TOCA PARA VER ❤️</h1>
</div>

<div id="album">
  <button id="prev" class="boton" onclick="anterior()">⬅️</button>
  
  <img id="foto" src="foto1.jpg">
  
  <button id="next" class="boton" onclick="siguiente()">➡️</button>
</div>

<script>
let fotos = [
  "foto1.jpg",
  "foto2.jpg",
  "foto3.jpg"
];

let index = 0;

function mostrarAlbum() {
  document.getElementById("inicio").style.display = "none";
  document.getElementById("album").style.display = "flex";
  corazones();
}

function siguiente() {
  index++;
  if (index >= fotos.length) index = 0;
  document.getElementById("foto").src = fotos[index];
}

function anterior() {
  index--;
  if (index < 0) index = fotos.length - 1;
  document.getElementById("foto").src = fotos[index];
}

/* Corazones */
function corazones() {
  setInterval(() => {
    let corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML = "❤️";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = Math.random() * 20 + 10 + "px";

    document.body.appendChild(corazon);

    setTimeout(() => {
      corazon.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
